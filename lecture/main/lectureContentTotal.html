<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/css/lecture/lectureContentTotal.css">
    <link rel="stylesheet" href="/src/css/reset.css">
    <title>CARDI</title>
</head>

<body>
    <div class="top-container">
        <div class="lct-lecture-container">
            <div class="lct-lecture-content">
                <h1 class="lct-lecture-title">현재 자신의 강의</h1>

                <div class="lct-search-box">
                    <img src="/src/assets/img/searchIcon.svg" alt="검색 아이콘" class="lct-search-icon" />
                    <input type="search" placeholder="제목으로 검색..." class="lct-search-input" />
                </div>

                <div class="lct-category-list">
                    <button class="lct-category-btn active">전체</button>
                    <button class="lct-category-btn">HTML</button>
                    <button class="lct-category-btn">CSS</button>
                    <button class="lct-category-btn">JavaScript</button>
                    <button class="lct-category-btn">C+</button>
                    <button class="lct-category-btn">Python</button>
                </div>

                <div class="lct-lecture-list">
                    <button class="lct-new-lecture">
                        <span>+</span>
                    </button>

                    <div class="lct-lecture-card">
                        <div class="lct-lecture-img"></div>
                        <div class="lct-lecture-info">
                            <h2 class="lct-lecture-card-title">강의 제목</h2>
                            <p class="lct-lecture-preview">강의 요약 텍스트1</p>
                            <span class="lct-lecturer-name">강사명</span>
                            <span class="lct-lecture-category">HTML</span>
                        </div>
                    </div>

                    <div class="lct-lecture-card">
                        <div class="lct-lecture-img"></div>
                        <div class="lct-lecture-info">
                            <h2 class="lct-lecture-card-title">강의 제목2</h2>
                            <p class="lct-lecture-preview">강의 요약 텍스트</p>
                            <span class="lct-lecturer-name">강사명</span>
                            <span class="lct-lecture-category">CSS</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="/src/js/components/includeHeader.js"></script>
        <script src="/src/js/components/includeNav.js"></script>
        <script src="/src/js/lecture/lectureContentTotal.js"></script>

</body>

</html>
