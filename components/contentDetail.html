<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../src/css/reset.css">
    <style>
        .cd-side-margin {
            margin: 0 50px;
        }

        .cd-lecture-img {
            width: 100%;
            height: 544px;
            border: 1px solid black;
            margin-top: 30px;
            background-color: lightgray;
        }

        .cd-main-container {
            width: 100%;
            margin-top: 50px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
        }
        .cd-main-content {
            width: 1309px;
            /* border: 1px solid black; */
        }

        .cd-main-nav {
            width: 100%;
            display: flex;
            padding-left: 35px;
            gap: 39px;
        }

        p {
            display: inline;
        }

        .cd-long-line {
            width: 100%;
            height: 1px;
            background-color: #2f4156;
        }

        .cd-content-box {
            width: 483px;
            height: 528px;
            border-radius: 20px;
            border: 1px solid #2F4156;
            background: #FFF;
        }
    </style>
</head>

<body>
    <div class="container">
        <main class="cd-side-margin">
            <div class="cd-lecture-img">사진</div>
            <div class="cd-main-container">
                <div class="cd-main-content">
                    <div class="cd-main-nav">
                        <p>강의소개</p>
                        <p>커리큘럼</p>
                        <p>커뮤니티</p>
                    </div>
                    <div class="cd-long-line">
                        <div class="cd-short-line"></div>
                        <div class="cd-short-line"></div>
                        <div class="cd-short-line"></div>
                    </div>
                </div>
                <div class="cd-content-box">
                    <p id="price">₩80,000</p>
                    <button class="modal-open-one-btn">원버튼</button>
                    <button class="modal-open-two-btn">투버튼</button>
                </div>
            </div>
        </main>
    </div>
    
    <div class="active-modal"></div>
    <script type="module" src="../src/js/components/includeHeader.js"></script>
    <script type="module" src="../src/js/components/includeNav.js"></script>
    <script type="module" src="../src/js/components/modalOneButton.js"></script>
    <script type="module" src="../src/js/components/modalTwoButton.js"></script>
</body>

</html>
